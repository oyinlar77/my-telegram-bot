// Count selection callbacks
bot.action(/^count_(.+)$/, async (ctx) => {
  await ctx.answerCbQuery();
  const match = (ctx.callbackQuery as any).data.match(/^count_(.+)$/);
  const count = parseInt(match[1]);
  const userId = ctx.from!.id;
  const state = userState[userId];
  
  if (!state) return ctx.reply('Qaytadan boshlang /start');
  
  state.count = count;
  state.step = 'confirm';
  
  const price = getPrice(state.service, count);
  const user = getUser(userId);
  
  const unitLabel = state.service === 'referat' ? 'sahifa' : 'ta';
  let msg = `📋 **Buyurtma ma'lumotlari:**\n\n`;
  msg += `🔹 Xizmat: **${state.service}**\n`;
  msg += `🔹 Mavzu: **${state.topic}**\n`;
  msg += `🔹 Hajm: **${count} ${unitLabel}**\n`;
  msg += `🔹 Narx: **${formatMoney(price)}**\n`;
  msg += `🔹 Balansingiz: **${formatMoney(user?.balance || 0)}**\n`;
  
  if ((user?.balance || 0) < price) {
    msg += `\n❌ Balansingiz yetarli emas!`;
    await ctx.replyWithMarkdown(msg, Markup.inlineKeyboard([
      [Markup.button.callback('🔙 Orqaga', 'back_main')]
    ]));
    return;
  }
  
  msg += `\nQoldiq: **${formatMoney((user?.balance || 0) - price)}**`;
  
  await ctx.replyWithMarkdown(msg, Markup.inlineKeyboard([
    [Markup.button.callback('✅ Tasdiqlash', `confirm_order`), Markup.button.callback('❌ Bekor', 'back_main')]
  ]));
});

// Confirm order
bot.action('confirm_order', async (ctx) => {
  await ctx.answerCbQuery('⏳ Ishlanmoqda...');
  const userId = ctx.from!.id;
  const state = userState[userId];
  
  if (!state) return;
  
  const price = getPrice(state.service, state.count);
  const user = getUser(userId);
  
  if (!user || user.balance < price) {
    await ctx.reply('❌ Balansingiz yetarli emas!');
    return;
  }
  
  updateBalance(userId, -price);
  saveOrder(userId, state.service, state.topic, state.count, price);
  
  const processingMsg = await ctx.reply('⏳ AI yordamida tayyorlanmoqda... Bu biroz vaqt olishi mumkin.');
  
  delete userState[userId];
  
  try {
    await processOrderAndSend(ctx, userId, state.service, state.topic, state.count);
    
    // Delete processing message
    try { await ctx.telegram.deleteMessage(ctx.chat!.id, processingMsg.message_id); } catch {}
    
  } catch (e: any) {
    console.error('Order processing error:', e);
    // Refund
    updateBalance(userId, price);
    await ctx.reply(`❌ Xatolik yuz berdi. Balans qaytarildi.\n\nXato: ${e.message}`);
  }
});

// Text handler for conversation flow
bot.on('text', async (ctx) => {
  const userId = ctx.from!.id;
  const state = userState[userId];
  const text = ctx.message.text;
  
  // Admin commands
  if (text.startsWith('/admin')) {
    if (!isAdmin(userId)) {
      // Try adding first-time admin (check admin list)
      const ADMIN_IDS = (process.env.ADMIN_IDS || '').split(',').map(Number);
      if (!ADMIN_IDS.includes(userId)) {
        return ctx.reply('❌ Ruxsat yo\'q');
      }
    }
    return showAdminPanel(ctx);
  }
  
  if (!state || state.step !== 'topic') return;
  
  state.topic = text;
  state.step = 'count';
  
  const service = state.service;
  
  let countButtons: any[][];
  let msg = '';
  
  if (service === 'referat') {
    msg = `📝 Mavzu qabul qilindi!\n\n**"${text}"**\n\nNecha sahifa kerak?`;
    countButtons = [
      [Markup.button.callback('5 sahifa', 'count_5'), Markup.button.callback('10 sahifa', 'count_10')],
      [Markup.button.callback('15 sahifa', 'count_15'), Markup.button.callback('20 sahifa', 'count_20')],
      [Markup.button.callback('25 sahifa', 'count_25')],
    ];
  } else if (service === 'test') {
    msg = `📋 Mavzu qabul qilindi!\n\n**"${text}"**\n\nNecha savol kerak?`;
    countButtons = [
      [Markup.button.callback('10 ta', 'count_10'), Markup.button.callback('20 ta', 'count_20')],
      [Markup.button.callback('30 ta', 'count_30'), Markup.button.callback('40 ta', 'count_40')],
    ];
  } else {
    msg = `🎞️ Mavzu qabul qilindi!\n\n**"${text}"**\n\nNecha slayd kerak?`;
    countButtons = [
      [Markup.button.callback('5 ta', 'count_5'), Markup.button.callback('10 ta', 'count_10')],
      [Markup.button.callback('15 ta', 'count_15')],
    ];
  }
  
  // Add prices info
  const allPrices = getAllPrices().filter((p: any) => p.service === service);
  msg += '\n\n💰 **Narxlar:**\n';
  allPrices.forEach((p: any) => {
    msg += `├ ${p.min_count}-${p.max_count} ta: ${formatMoney(p.price)}\n`;
  });
  
  countButtons.push([Markup.button.callback('❌ Bekor qilish', 'back_main')]);
  
  await ctx.replyWithMarkdown(msg, Markup.inlineKeyboard(countButtons));
});

