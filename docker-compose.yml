// Handle admin text inputs
bot.on('text', async (ctx) => {
  const userId = ctx.from!.id;
  const state = userState[userId];
  if (!state) return;
  
  if (state.step === 'admin_topup_id') {
    const targetId = parseInt(ctx.message.text);
    if (isNaN(targetId)) return ctx.reply('❌ Noto\'g\'ri ID');
    
    state.targetId = targetId;
    state.step = 'admin_topup_amount';
    await ctx.reply(`💰 Foydalanuvchi ID: ${targetId}\n\nMiqdorni kiriting (so'mda):`);
    return;
  }
  
  if (state.step === 'admin_topup_amount') {
    const amount = parseInt(ctx.message.text);
    if (isNaN(amount) || amount <= 0) return ctx.reply('❌ Noto\'g\'ri miqdor');
    
    const target = getUser(state.targetId);
    if (!target) return ctx.reply('❌ Foydalanuvchi topilmadi');
    
    updateBalance(state.targetId, amount);
    delete userState[userId];
    
    await ctx.reply(`✅ ${formatMoney(amount)} muvaffaqiyatli qo\'shildi!\nFoydalanuvchi ${state.targetId} yangi balansi: ${formatMoney(target.balance + amount)}`);
    
    // Notify user
    try {
      await ctx.telegram.sendMessage(state.targetId, `🎉 Balansingizga **${formatMoney(amount)}** qo'shildi!\nJangi balansingiz: **${formatMoney(target.balance + amount)}**`, { parse_mode: 'Markdown' });
    } catch {}
    return;
  }
  
  if (state.step === 'admin_price_input') {
    const price = parseInt(ctx.message.text);
    if (isNaN(price) || price <= 0) return ctx.reply('❌ Noto\'g\'ri narx');
    
    updatePrice(state.service, state.tier, price);
    delete userState[userId];
    
    await ctx.reply(`✅ Narx yangilandi: ${state.service} / ${state.tier} = ${formatMoney(price)}`);
    return;
  }
});

// Process order and send result
async function processOrderAndSend(ctx: Context, userId: number, service: string, topic: string, count: number) {
  let content = '';
  let filename = '';
  let successMsg = '';
  
  if (service === 'referat') {
    content = await generateReferat(topic, count);
    filename = `referat_${Date.now()}`;
    successMsg = `✅ Referat tayyor!\n\n📝 Mavzu: **${topic}**\n📄 Hajm: ${count} sahifa\n\nPDF fayl yuborilmoqda...`;
  } else if (service === 'test') {
    content = await generateTest(topic, count);
    filename = `test_${Date.now()}`;
    successMsg = `✅ Test tayyor!\n\n📋 Mavzu: **${topic}**\n🔢 Savollar: ${count} ta\n\nPDF fayl yuborilmoqda...`;
  } else {
    content = await generateSlide(topic, count);
    successMsg = `✅ Slayd kontentar tayyor!\n\n🎞️ Mavzu: **${topic}**\n📊 Slaydlar: ${count} ta\n\nMatn shaklida:`;
    await ctx.replyWithMarkdown(successMsg);
    // For slides, send as text (not PDF)
    const chunkSize = 4096;
    for (let i = 0; i < content.length; i += chunkSize) {
      await ctx.reply(content.slice(i, i + chunkSize));
    }
    return;
  }
  
  // Generate PDF
  const pdfPath = await generatePDF(content, topic, service);
  
  await ctx.replyWithMarkdown(successMsg);
  await ctx.replyWithDocument({ source: pdfPath, filename: `${filename}.pdf` });
  
  cleanupFile(pdfPath);
}

// Process order from Web App
async function processOrder(userId: number, service: string, topic: string, count: number) {
  try {
    let content = '';
    let pdfTitle = topic;
    
    if (service === 'referat') {
      content = await generateReferat(topic, count);
    } else if (service === 'test') {
      content = await generateTest(topic, count);
    } else {
      content = await generateSlide(topic, count);
      await bot.telegram.sendMessage(userId, `✅ Slayd kontent tayyor!\n\n🎞️ Mavzu: **${topic}**`, { parse_mode: 'Markdown' });
      const chunkSize = 4096;
      for (let i = 0; i < content.length; i += chunkSize) {
        await bot.telegram.sendMessage(userId, content.slice(i, i + chunkSize));
      }
      return;
    }
    
    const pdfPath = await generatePDF(content, pdfTitle, service);
    
    await bot.telegram.sendMessage(userId, `✅ **${service}** tayyor! PDF fayl yuborilmoqda...`, { parse_mode: 'Markdown' });
    await bot.telegram.sendDocument(userId, { source: pdfPath, filename: `${service}_${Date.now()}.pdf` });
    
    cleanupFile(pdfPath);
  } catch (e: any) {
    console.error('processOrder error:', e);
    // Refund price
    const price = getPrice(service, count);
    updateBalance(userId, price);
    await bot.telegram.sendMessage(userId, `❌ Xatolik yuz berdi. Balansingiz qaytarildi.\nXato: ${e.message}`);
  }
}

// Admin command
bot.command('admin', async (ctx) => {
  const ADMIN_IDS = (process.env.ADMIN_IDS || '').split(',').map(Number).filter(Boolean);
  
  if (!isAdmin(ctx.from.id) && !ADMIN_IDS.includes(ctx.from.id)) {
    return ctx.reply('❌ Siz admin emassiz');
  }
  
  if (!isAdmin(ctx.from.id)) {
    addAdmin(ctx.from.id, ctx.from.username || '');
  }
  
  return showAdminPanel(ctx);
});

